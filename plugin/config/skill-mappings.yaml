file_patterns:
  "*.java": [java-coding-standards]
  "*.ts": [frontend-design, frontend-patterns]
  "*.tsx": [frontend-design, frontend-patterns]
  "*.jsx": [frontend-design, frontend-patterns]
  "*.css": [frontend-design]
  "*.scss": [frontend-design]
  "*.py": [python-patterns]
  "*.go": [golang-patterns]
  "*.rs": [rust-patterns]
  "*.c": [cpp-patterns]
  "*.h": [cpp-patterns]
  "*.cpp": [cpp-patterns]
  "*.cc": [cpp-patterns]
  "*.hpp": [cpp-patterns]
  "*.swift": [swift-patterns]
  "*.sql": [postgres-patterns, database-design]
  "*.sh": [shell-patterns]
  "*.bash": [shell-patterns]
  "Makefile": [shell-patterns]
  "Dockerfile": [docker-patterns, cloud-infrastructure]
  "Dockerfile.*": [docker-patterns, cloud-infrastructure]
  "docker-compose*.yml": [docker-patterns, cloud-infrastructure]
  "docker-compose*.yaml": [docker-patterns, cloud-infrastructure]
  "*.spec.ts": [e2e-testing]
  "*.e2e.ts": [e2e-testing]
  "*.test.e2e.ts": [e2e-testing]
  "*.tf": [cloud-infrastructure]
  "*.tfvars": [cloud-infrastructure]

framework_markers:
  "@SpringBootApplication": [springboot-patterns]
  "@SpringBoot": [springboot-patterns]
  "@Entity": [jpa-patterns]
  "@Repository": [jpa-patterns]
  "@RestController": [springboot-patterns, api-design]
  "express|fastify|koa|hono": [api-design, backend-patterns]
  "FastAPI|flask": [api-design]
  "Django|django": [api-design, django-patterns]
  "React|NextJS|next/": [frontend-design, frontend-patterns]
  "Vue|Nuxt": [frontend-design, frontend-patterns]
  "Playwright|@playwright": [e2e-testing]
  "Cypress|cypress": [e2e-testing]
  "terraform|module|resource": [cloud-infrastructure]

directory_patterns:
  "migrations/": [database-migrations, database-design]
  "db/migrate/": [database-migrations, database-design]
  "src/main/resources/db/": [database-migrations, jpa-patterns, database-design]
  "openapi/": [api-design]
  "swagger/": [api-design]
  ".github/workflows/": [deployment-patterns, cloud-infrastructure]
  "Jenkinsfile": [deployment-patterns, cloud-infrastructure]
  ".gitlab-ci.yml": [deployment-patterns, cloud-infrastructure]
  "e2e/": [e2e-testing]
  "tests/e2e/": [e2e-testing]
  "playwright.config": [e2e-testing]
  "manage.py": [django-patterns]
  "*/apps/": [django-patterns]
  "terraform/": [cloud-infrastructure]
  "infra/": [cloud-infrastructure]
  "k8s/": [cloud-infrastructure]
  "kubernetes/": [cloud-infrastructure]
  "helm/": [cloud-infrastructure]
  "scripts/": [shell-patterns]
